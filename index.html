<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-theme="light">
    <div class="container">
        <header>
            <div class="greeting-container">
                <h1 id="greeting">Hello, <span id="user-name" contenteditable="true">User</span></h1>
                <p id="date-display"></p>
            </div>
            <button id="theme-toggle">🌓 Mode</button>
        </header>

        <main class="grid-layout">
            <section class="card timer-card">
                <h2>Focus Timer</h2>
                <div class="timer-display" id="timer">25:00</div>
                <div class="timer-controls">
                    <button id="start-timer">Start</button>
                    <button id="stop-timer">Stop</button>
                    <button id="reset-timer">Reset</button>
                </div>
                <div class="timer-settings">
                    <input type="number" id="pomo-duration" value="25" min="1"> min
                </div>
            </section>

            <section class="card todo-card">
                <h2>Tasks</h2>
                <div class="input-group">
                    <input type="text" id="todo-input" placeholder="What's next?">
                    <button id="add-todo">Add</button>
                </div>
                <ul id="todo-list"></ul>
            </section>

            <section class="card links-card">
                <h2>Quick Links</h2>
                <div id="links-container" class="links-grid"></div>
                <div class="input-group">
                    <input type="text" id="link-name" placeholder="Name">
                    <input type="text" id="link-url" placeholder="URL (https://)">
                    <button id="add-link">Save</button>
                </div>
            </section>
        </main>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
